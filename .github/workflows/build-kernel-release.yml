name: Build and Release OnePlus Kernels

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      make_release:
        description: 'Do you want to create a release?'
        required: true
        type: boolean
        default: false
      ksun_branch:
        description: "Choose KernelSU Next Branch"
        required: true
        type: choice
        options:
          - stable
          - next
        default: next
      android12-5_10_susfs_branch:
        description: "Choose SusFS Branch for android12-5.10"
        type: string
        default: "gki-android12-5.10"
      android13-5_10_susfs_branch:
        description: "Choose SusFS Branch for android13-5.10"
        type: string
        default: "gki-android13-5.10"
      android13-5_15_susfs_branch:
        description: "Choose SusFS Branch for android13-5.15"
        type: string
        default: "gki-android13-5.15"
      android14-5_15_susfs_branch:
        description: "Choose SusFS Branch for android14-5.15"
        type: string
        default: "gki-android14-5.15"
      android14-6_1_susfs_branch:
        description: "Choose SusFS Branch for android14-6.1"
        type: string
        default: "gki-android14-6.1"
      android15-6_6_susfs_branch:
        description: "Choose SusFS Branch for android15-6.6"
        type: string
        default: "gki-android15-6.6"

jobs:
  build_kernel_release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - model: OPad2Pro
            soc: sun
            branch: oneplus/sm8750
            manifest: oneplus_pad_2_pro.xml
            android_version: android15
            kernel_version: "6.6"
          - model: OPPad3
            soc: sun
            branch: oneplus/sm8750
            manifest: oneplus_pad_3.xml
            android_version: android15
            kernel_version: "6.6"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for tag generation

      - name: Set up Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Build Kernel
        id: build_kernel
        uses: ./OnePlus_KernelSU_SUSFS/ # Updated path based on error
        with:
          model: ${{ matrix.model }}
          soc: ${{ matrix.soc }}
          branch: ${{ matrix.branch }}
          manifest: ${{ matrix.manifest }}
          android_version: ${{ matrix.android_version }}
          kernel_version: ${{ matrix.kernel_version }}
          ksun_branch: ${{ inputs.ksun_branch }} # Sử dụng đầu vào từ workflow_dispatch
          susfs_branch: ${{ inputs.susfs_branch }} # Sử dụng đầu vào từ workflow_dispatch

      - name: Set Release Name and Notes
        run: |
          RELEASE_NAME="Kernel for ${{ matrix.model }} (${{ matrix.android_version }}-${{ matrix.kernel_version }})"
          RELEASE_NOTES="This release provides the latest KernelSU Next (v1.0.8) and SUSFS (v1.5.2+) for ${{ matrix.model }} running Android ${{ matrix.android_version }} with kernel version ${{ matrix.kernel_version }}.
          
          **KernelSU Next Version:** v1.0.8
          **SUSFS Version:** v1.5.2+ (Commit: 38e6d6c3)
          
          **Disclaimer:** Flashing this kernel will void your warranty, and there is always a risk of bricking your device. Please make sure to back up your data and ensure you understand the risks before proceeding. Proceed at your own risk!
          
          **Changes:**
          - Updated KernelSU Next to v1.0.8
          - Updated SUSFS to v1.5.2+ (Commit: 38e6d6c3)
          - General kernel optimizations and bug fixes.
          "
          echo "RELEASE_NAME=${RELEASE_NAME}" >> $GITHUB_ENV
          echo "RELEASE_NOTES=${RELEASE_NOTES}" >> $GITHUB_ENV

      - name: Generate and Push Tag
        if: success() && inputs.make_release == true
        run: |
            BASE_TAG="${{ matrix.model }}-${{ matrix.android_version }}-${{ matrix.kernel_version }}-KSU_Next_v1.0.8-SUSFS_v1.5.2+"
            LATEST_TAG=$(git tag -l "$BASE_TAG*" | sort -rV | head -n1)
            
            if [ -z "$LATEST_TAG" ]; then
              LATEST_TAG="$BASE_TAG"
            else
              LATEST_TAG=$(printf "%s\\n%s\\n" "$LATEST_TAG" "$BASE_TAG" | sort -rV | head -n1)
            fi
            NEW_TAG=$(echo "$LATEST_TAG" | awk -F'-r' '{suffix=$2; if (!suffix) suffix=0; suffix++; printf "%s-r%d", $1, suffix}')
            echo "New tag: $NEW_TAG"
            echo "NEW_TAG=${NEW_TAG}" >> $GITHUB_ENV
            git tag $NEW_TAG
            git push origin $NEW_TAG

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./downloaded-artifacts

      - name: Create GitHub Release
        if: success() && inputs.make_release == true
        uses: actions/create-release@v1
        with:
          tag_name: ${{ env.NEW_TAG }}
          prerelease: true
          release_name: ${{ env.RELEASE_NAME }}
          body: ${{ env.RELEASE_NOTES }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets Dynamically
        if: success() && inputs.make_release == true
        run: |
          for file in ./downloaded-artifacts/kernel-*/*; do
              if [ -d "$file" ]; then
                  continue
              fi
              echo "Uploading $file..."
              gh release upload ${{ env.NEW_TAG }} "$file"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ env.NEW_TAG }}
